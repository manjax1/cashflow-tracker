<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cashflow Agent — Sign in</title>
<style>
  body { font: 15px -apple-system, "Segoe UI", Roboto, sans-serif; background: #f5f4ef;
         display: grid; place-items: center; min-height: 100vh; margin: 0; color: #1a1a17; }
  form { background: #fff; border: 1px solid #e3e1d9; border-radius: 14px;
         padding: 28px 32px; text-align: center; width: 300px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p { color: #6b6a63; font-size: 13px; margin: 0 0 16px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid #e3e1d9; border-radius: 10px;
          font: inherit; margin-bottom: 10px; box-sizing: border-box; }
  button { width: 100%; padding: 11px; background: #c96442; color: #fff; border: none;
           border-radius: 10px; font: inherit; cursor: pointer; }
</style>
</head>
<body>
  <form method="POST" action="/login">
    <h1>💰 Cashflow Agent</h1>
    <p>Sign in with your account and authenticator code</p>
    <input type="text" name="username" placeholder="Username" autocomplete="username" autofocus>
    <input type="password" name="password" placeholder="Password" autocomplete="current-password">
    <input type="text" name="code" placeholder="6-digit code" inputmode="numeric"
           pattern="[0-9]*" maxlength="6" autocomplete="one-time-code">
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
